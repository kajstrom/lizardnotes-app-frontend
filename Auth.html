<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LizardNotes — Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth-mobile.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel">
const I = window.LN_ICONS;
const { useState, useEffect, useRef } = React;

function WarnIcon({variant}) {
  if (variant === "green") {
    return <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" strokeWidth="1.3"/><path d="M5.5 8l1.8 1.8L10.5 6" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  }
  return <I.Warn />;
}

function LockIcon() {
  return (
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="5" y="9.5" width="12" height="9" rx="1.5" stroke="currentColor" strokeWidth="1.5"/>
      <path d="M7.5 9.5V6.5a3.5 3.5 0 017 0v3" stroke="currentColor" strokeWidth="1.5"/>
    </svg>
  );
}

function Brand({icon}) {
  return (
    <div className="ln-auth-brand">
      <div className="ln-auth-mark" data-icon={icon}>
        {icon === "lock" ? <LockIcon/> : "🦎"}
      </div>
    </div>
  );
}

function OtpRow({values, onChange}) {
  const refs = useRef([]);
  return (
    <div className="ln-otp-row">
      {values.map((v, i) => (
        <input
          key={i}
          ref={(el) => refs.current[i] = el}
          className="ln-otp"
          data-filled={!!v}
          value={v}
          maxLength={1}
          inputMode="numeric"
          onChange={(e) => {
            const ch = e.target.value.replace(/\D/g, "").slice(-1);
            const next = [...values];
            next[i] = ch;
            onChange(next);
            if (ch && i < 5) refs.current[i+1]?.focus();
          }}
          onKeyDown={(e) => {
            if (e.key === "Backspace" && !values[i] && i > 0) refs.current[i-1]?.focus();
          }}
        />
      ))}
    </div>
  );
}

function LoginScreen({go}) {
  return (
    <div className="ln-auth-card">
      <Brand />
      <h1 className="ln-auth-title">Sign in</h1>
      <p className="ln-auth-sub">Welcome back to LizardNotes.</p>
      <div className="ln-auth-field">
        <label className="ln-auth-label">Email</label>
        <input className="ln-auth-input" defaultValue="priya@lizardnotes.io" />
      </div>
      <div className="ln-auth-field">
        <label className="ln-auth-label">Password</label>
        <input className="ln-auth-input" type="password" defaultValue="••••••••••" />
      </div>
      <div className="ln-auth-actions">
        <button className="ln-auth-btn" onClick={() => go("mfa")}>Sign in</button>
        <a className="ln-auth-link" onClick={() => go("forgot")}>Forgot password?</a>
      </div>
    </div>
  );
}

function SetPasswordScreen({go}) {
  return (
    <div className="ln-auth-card">
      <Brand />
      <h1 className="ln-auth-title">Set a new password</h1>
      <p className="ln-auth-sub">Your account was created with a temporary password. Choose a new one to continue.</p>
      <div className="ln-info-box" data-variant="amber" style={{marginTop: 16}}>
        <span className="ln-info-icon" data-variant="amber"><WarnIcon/></span>
        <div>
          <strong>Temporary password expires in 24 hours.</strong> You must set a new password to finish signing in.
        </div>
      </div>
      <div className="ln-auth-field">
        <label className="ln-auth-label">New password</label>
        <input className="ln-auth-input" type="password" defaultValue="••••••••••" />
        <div className="ln-auth-hint">Min. 8 characters, one number, one symbol.</div>
      </div>
      <div className="ln-auth-field">
        <label className="ln-auth-label">Confirm password</label>
        <input className="ln-auth-input" type="password" defaultValue="••••••••••" />
      </div>
      <div className="ln-auth-actions">
        <button className="ln-auth-btn" onClick={() => go("mfa-setup-1")}>Continue</button>
      </div>
    </div>
  );
}

function Steps({current}) {
  return (
    <div className="ln-steps">
      <span className="ln-steps-dot" data-active={current >= 1}>1</span>
      <span className="ln-steps-line"/>
      <span className="ln-steps-dot" data-active={current >= 2}>2</span>
      <span style={{marginLeft: 8, textTransform: "uppercase"}}>
        {current === 1 ? "Scan QR code" : "Verify code"}
      </span>
    </div>
  );
}

function MfaSetup1Screen({go}) {
  return (
    <div className="ln-auth-card">
      <Brand icon="lock" />
      <h1 className="ln-auth-title">Set up two-factor auth</h1>
      <p className="ln-auth-sub">Scan this QR code with an authenticator app — 1Password, Authy, or Google Authenticator.</p>
      <div style={{marginTop: 12}}>
        <Steps current={1}/>
      </div>
      <div className="ln-qr"><div className="ln-qr-inner"><div className="ln-qr-corner"/></div></div>
      <a className="ln-auth-link">Can't scan? Enter setup key manually</a>
      <div className="ln-auth-actions">
        <button className="ln-auth-btn" onClick={() => go("mfa-setup-2")}>Next</button>
      </div>
    </div>
  );
}

function MfaSetup2Screen({go}) {
  const [code, setCode] = useState(["", "", "", "", "", ""]);
  return (
    <div className="ln-auth-card">
      <Brand icon="lock" />
      <h1 className="ln-auth-title">Verify your authenticator</h1>
      <p className="ln-auth-sub">Enter the 6-digit code from your authenticator app.</p>
      <div style={{marginTop: 12}}>
        <Steps current={2}/>
      </div>
      <div style={{marginTop: 16}}>
        <OtpRow values={code} onChange={setCode} />
      </div>
      <div className="ln-auth-actions">
        <button className="ln-auth-btn" onClick={() => go("login")}>Confirm setup</button>
        <a className="ln-auth-link" onClick={() => go("mfa-setup-1")}>Back</a>
      </div>
    </div>
  );
}

function MfaScreen({go}) {
  const [code, setCode] = useState(["", "", "", "", "", ""]);
  return (
    <div className="ln-auth-card">
      <Brand icon="lock" />
      <h1 className="ln-auth-title">Enter verification code</h1>
      <p className="ln-auth-sub">Open your authenticator app and enter the 6-digit code.</p>
      <div className="ln-info-box" data-variant="neutral" style={{marginTop: 16}}>
        Signing in as <strong style={{color: "var(--ln-text)"}}>priya@lizardnotes.io</strong>
      </div>
      <div style={{marginTop: 12}}>
        <OtpRow values={code} onChange={setCode} />
      </div>
      <div className="ln-auth-actions">
        <button className="ln-auth-btn" onClick={() => { window.location.href = "LizardNotes.html"; }}>Verify</button>
        <a className="ln-auth-link" onClick={() => go("login")}>Use a different account</a>
      </div>
    </div>
  );
}

function ForgotScreen({go}) {
  return (
    <div className="ln-auth-card">
      <Brand />
      <h1 className="ln-auth-title">Reset your password</h1>
      <p className="ln-auth-sub">We'll email you a code to reset your password.</p>
      <div className="ln-auth-field" style={{marginTop: 20}}>
        <label className="ln-auth-label">Email</label>
        <input className="ln-auth-input" defaultValue="priya@lizardnotes.io" />
      </div>
      <div className="ln-auth-actions">
        <button className="ln-auth-btn" onClick={() => go("reset")}>Send reset code</button>
        <a className="ln-auth-link" onClick={() => go("login")}>Back to sign in</a>
      </div>
    </div>
  );
}

function ResetScreen({go}) {
  return (
    <div className="ln-auth-card">
      <Brand />
      <h1 className="ln-auth-title">Enter reset code</h1>
      <p className="ln-auth-sub">Check your inbox and enter the code below with your new password.</p>
      <div className="ln-info-box" data-variant="green" style={{marginTop: 16}}>
        <span className="ln-info-icon" data-variant="green"><WarnIcon variant="green"/></span>
        <div>A code was sent to <strong style={{color: "var(--ln-text)"}}>priya@lizardnotes.io</strong>. It expires in 15 minutes.</div>
      </div>
      <div className="ln-auth-field">
        <label className="ln-auth-label">Code from email</label>
        <input className="ln-auth-input" placeholder="6-digit code" />
      </div>
      <div className="ln-auth-field">
        <label className="ln-auth-label">New password</label>
        <input className="ln-auth-input" type="password" defaultValue="••••••••••" />
      </div>
      <div className="ln-auth-field">
        <label className="ln-auth-label">Confirm password</label>
        <input className="ln-auth-input" type="password" defaultValue="••••••••••" />
      </div>
      <div className="ln-auth-actions">
        <button className="ln-auth-btn" onClick={() => go("login")}>Reset password</button>
        <a className="ln-auth-link">Resend code</a>
      </div>
    </div>
  );
}

const SCREENS = [
  { id: "login", label: "Login", C: LoginScreen },
  { id: "set-password", label: "Set Password", C: SetPasswordScreen },
  { id: "mfa-setup-1", label: "MFA Setup · QR", C: MfaSetup1Screen },
  { id: "mfa-setup-2", label: "MFA Setup · Verify", C: MfaSetup2Screen },
  { id: "mfa", label: "MFA Code", C: MfaScreen },
  { id: "forgot", label: "Forgot", C: ForgotScreen },
  { id: "reset", label: "Reset", C: ResetScreen },
];

function App() {
  const [id, setId] = useState(() => localStorage.getItem("ln:auth-screen") || "login");
  useEffect(() => { localStorage.setItem("ln:auth-screen", id); }, [id]);
  const current = SCREENS.find((s) => s.id === id) || SCREENS[0];
  const C = current.C;
  return (
    <div className="ln-auth-page">
      <div className="ln-auth-nav">
        {SCREENS.map((s) => (
          <button key={s.id} data-active={s.id === id} onClick={() => setId(s.id)}>
            {s.label}
          </button>
        ))}
      </div>
      <C go={setId} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
