name: Deploy

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Read SSM parameters
        run: |
          fetch() {
            local val
            val=$(aws ssm get-parameter --name "$1" \
              --query Parameter.Value --output text)
            if [[ -z "$val" ]]; then
              echo "ERROR: SSM parameter $1 returned empty" >&2
              exit 1
            fi
            echo "$val"
          }
          echo "API_URL=$(fetch /lizardnotes/apigateway/apiUrl)" >> $GITHUB_ENV
          echo "COGNITO_USER_POOL_ID=$(fetch /lizardnotes/cognito/userPoolId)" >> $GITHUB_ENV
          echo "COGNITO_APP_CLIENT_ID=$(fetch /lizardnotes/cognito/appClientId)" >> $GITHUB_ENV
          echo "BUCKET_NAME=$(fetch /lizardnotes/frontend/bucketName)" >> $GITHUB_ENV
          echo "DISTRIBUTION_ID=$(fetch /lizardnotes/frontend/distributionId)" >> $GITHUB_ENV

      - name: flutter build web
        run: |
          flutter build web --release \
            --dart-define=API_URL="$API_URL" \
            --dart-define=COGNITO_USER_POOL_ID="$COGNITO_USER_POOL_ID" \
            --dart-define=COGNITO_APP_CLIENT_ID="$COGNITO_APP_CLIENT_ID"

      - name: Sync to S3
        run: |
          aws s3 sync build/web/ s3://$BUCKET_NAME \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

          aws s3 cp build/web/index.html \
            s3://$BUCKET_NAME/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*"

      - name: Confirm deployment
        run: echo "Deployed to https://lizardnotes.kstrm.com"
